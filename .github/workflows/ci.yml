# CI workflow to run BLIP test suite

name: BLIP CI

on:
  push:
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.10.9"
    - name: Test on CPU with pytest
      # this uses the CPU version of JAX and no lisaorbits
      run: uv run --group test pytest
